services:
  - type: web
    name: candidate-transformer-api
    env: python
    region: oregon
    plan: free
    runtime: python
    pythonVersion: 3.13.7
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
