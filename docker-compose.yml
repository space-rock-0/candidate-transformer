version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: candidate-transformer-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - ct-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: candidate-transformer-web
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ct-network

networks:
  ct-network:
    driver: bridge
